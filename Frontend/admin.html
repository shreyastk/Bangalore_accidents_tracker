<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Bangalore Accidents Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="css/main.css?v=2">
  <link rel="stylesheet" href="css/admin.css?v=2">
</head>
<body>

<!-- ── Login Screen ──────────────────────────────────────────────────────── -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <img src="logo.png" alt="BAT Logo" style="height: 80px; width: auto; object-fit: contain; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto;">
    <h1 class="login-title">Admin Portal</h1>
    <p class="login-sub">Bangalore Accidents Tracker</p>
    <div id="login-error" class="login-error" hidden></div>
    <form id="login-form" autocomplete="off">
      <div class="field-group">
        <label class="field-label">Username</label>
        <input type="text" id="login-user" class="field-input" placeholder="admin" autocomplete="username" required>
      </div>
      <div class="field-group">
        <label class="field-label">Password</label>
        <input type="password" id="login-pass" class="field-input" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login" id="login-btn">Sign In</button>
    </form>
  </div>
</div>

<!-- ── Admin Dashboard ───────────────────────────────────────────────────── -->
<div id="admin-app" class="admin-app" hidden>

  <!-- Navbar -->
  <nav class="admin-nav">
    <div class="nav-brand">
      <img src="logo.png" alt="BAT Logo" style="height: 36px; width: auto; object-fit: contain;">
      <span class="nav-title">Admin</span>
      <span class="nav-badge">Dashboard</span>
    </div>
    <div class="nav-right">
      <a href="dashboard.html" class="nav-link" target="_blank">↗ Public Map</a>
      <span class="nav-user" id="nav-user"></span>
      <button class="btn-logout" id="logout-btn">Logout</button>
    </div>
  </nav>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-box">
      <div class="stat-n" id="s-total">—</div>
      <div class="stat-l">Total Records</div>
    </div>
    <div class="stat-box stat-box--active">
      <div class="stat-n" id="s-active">—</div>
      <div class="stat-l">Active</div>
    </div>
    <div class="stat-box stat-box--hidden">
      <div class="stat-n" id="s-hidden">—</div>
      <div class="stat-l">Hidden</div>
    </div>
    <div class="stat-box stat-box--fatal">
      <div class="stat-n" id="s-fatal">—</div>
      <div class="stat-l">Fatal</div>
    </div>
    <div class="stat-box stat-box--serious">
      <div class="stat-n" id="s-serious">—</div>
      <div class="stat-l">Serious</div>
    </div>
    <div class="stat-box stat-box--minor">
      <div class="stat-n" id="s-minor">—</div>
      <div class="stat-l">Minor</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <input type="text" id="search-box" class="t-input t-search" placeholder=" Search title, location, area…">
      <select class="t-input t-select" id="f-status">
        <option value="all">All Status</option>
        <option value="active">Active</option>
        <option value="hidden">Hidden</option>
      </select>
      <select class="t-input t-select" id="f-severity">
        <option value="all">All Severities</option>
        <option value="fatal">Fatal</option>
        <option value="serious">Serious</option>
        <option value="minor">Minor</option>
      </select>
      <button class="btn-apply" id="apply-btn">Apply</button>
    </div>
    <div class="toolbar-right">
      <span class="record-count" id="record-count"></span>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table class="data-table" id="data-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Title</th>
          <th>Source</th>
          <th>Date</th>
          <th>Location</th>
          <th>Severity</th>
          <th>Coords</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="9" class="t-loading">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div class="pagination" id="pagination"></div>

</div><!-- /#admin-app -->

<!-- ── Edit Modal ─────────────────────────────────────────────────────────── -->
<div id="edit-modal" class="modal-backdrop" hidden>
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">Edit Record</span>
      <button class="modal-close" id="modal-close"></button>
    </div>
    <div class="modal-body">
      <div class="modal-info" id="modal-info"></div>

      <div class="modal-section-label"> Coordinates — click on map to set location</div>
      <div id="edit-map" class="edit-map"></div>

      <div class="coord-inputs">
        <div class="field-group">
          <label class="field-label">Latitude</label>
          <input type="number" id="edit-lat" class="field-input" step="0.000001" placeholder="12.9716">
        </div>
        <div class="field-group">
          <label class="field-label">Longitude</label>
          <input type="number" id="edit-lng" class="field-input" step="0.000001" placeholder="77.5946">
        </div>
      </div>

      <div class="modal-section-label"> Article Link</div>
      <div class="modal-link-row">
        <input type="url" id="modal-link" class="field-input" placeholder="https://…" readonly>
        <a id="modal-link-open" href="#" target="_blank" rel="noopener" class="btn-open-link">Open ↗</a>
      </div>

      <div id="modal-error" class="modal-error" hidden></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-save" id="modal-save">Save Coordinates</button>
    </div>
  </div>
</div>

<!-- ── Confirm Delete Modal ───────────────────────────────────────────────── -->
<div id="confirm-modal" class="modal-backdrop" hidden>
  <div class="modal-box modal-box--sm">
    <div class="modal-header">
      <span class="modal-title">Confirm Delete</span>
      <button class="modal-close" id="confirm-close"></button>
    </div>
    <div class="modal-body">
      <p id="confirm-text" style="font-size:14px;color:#475569;line-height:1.6;"></p>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="confirm-cancel">Cancel</button>
      <button class="btn-delete-confirm" id="confirm-ok">Delete Permanently</button>
    </div>
  </div>
</div>

<script src="js/bat-config.js"></script>
<script src="js/admin-app.js"></script>
</body>
</html>
